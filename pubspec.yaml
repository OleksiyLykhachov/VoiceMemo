name: voice_memos
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  record: ^6.2.0
  just_audio: ^0.10.5
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  provider: ^6.1.5
  gap: ^3.0.1
  freezed_annotation: ^3.1.0
  objectbox: ^5.3.1
  objectbox_flutter_libs: ^5.3.1
  path: ^1.9.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  toastification: ^3.2.0
  collection: ^1.19.1
  flutter_svg: ^2.2.4
  stream_transform: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  flutter_lints: ^6.0.0
  injectable_generator: ^2.12.1
  freezed: ^3.2.3
  build_runner: ^2.11.1
  objectbox_generator: ^5.3.1

flutter:

  uses-material-design: true

  fonts:
    - family: Bebas Neue
      fonts:
        - asset: fonts/bebas-neue/BebasNeue Light.otf
          weight: 300
        - asset: fonts/bebas-neue/BebasNeue Book.otf
          weight: 400
        - asset: fonts/bebas-neue/BebasNeue Regular.otf
          weight: 400
        - asset: fonts/bebas-neue/BebasNeue.otf
          weight: 400
        - asset: fonts/bebas-neue/BebasNeue Bold.otf
          weight: 700
    - family: SF Pro Display
      fonts:
        - asset: fonts/sf-pro-display/SFPRODISPLAYREGULAR.otf
          weight: 400
        - asset: fonts/sf-pro-display/SFPRODISPLAYMEDIUM.otf
          weight: 500
        - asset: fonts/sf-pro-display/SFPRODISPLAYBOLD.otf
          weight: 700

  assets:
    - assets/icons/backward_10.svg
    - assets/icons/forward_10.svg
