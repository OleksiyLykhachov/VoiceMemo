name: voice_memos
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  record: ^6.2.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  provider: ^6.1.5
  gap: ^3.0.1
  freezed_annotation: ^3.1.0
  objectbox: ^5.3.1
  objectbox_flutter_libs: ^5.3.1
  path: ^1.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.8.1
  freezed: ^3.2.3
  build_runner: 2.7.1
  objectbox_generator: ^4.3.1


flutter:

  uses-material-design: true

  fonts:
    - family: Bebas Neue
      fonts:
        - asset: fonts/bebas-neue/BebasNeue Light.otf
          weight: 300
        - asset: fonts/bebas-neue/BebasNeue Book.otf
          weight: 400
        - asset: fonts/bebas-neue/BebasNeue Regular.otf
          weight: 400
        - asset: fonts/bebas-neue/BebasNeue.otf
          weight: 400
        - asset: fonts/bebas-neue/BebasNeue Bold.otf
          weight: 700
    - family: SF Pro Display
      fonts:
        - asset: fonts/sf-pro-display/SFPRODISPLAYREGULAR.otf
          weight: 400
        - asset: fonts/sf-pro-display/SFPRODISPLAYMEDIUM.otf
          weight: 500
        - asset: fonts/sf-pro-display/SFPRODISPLAYBOLD.otf
          weight: 700

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
